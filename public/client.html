<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>4force lab · 文件簽署</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --neon-green:#00FF9F; --neon-pink:#FF2D78; --neon-blue:#00B4FF;
    --bg:#05070d; --panel:rgba(14,18,28,.72); --line:rgba(0,255,159,.18); --muted:#7e8aa0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:#e8edf5;
    min-height:100vh;padding:22px 14px 50px;overflow-x:hidden}
  canvas#particles{position:fixed;inset:0;z-index:0}
  .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto}
  .head{display:flex;align-items:center;gap:12px;margin-bottom:18px;justify-content:center}
  .head img{height:46px;width:auto}
  .head h1{font-size:18px;font-weight:800;letter-spacing:1px;
    background:linear-gradient(90deg,var(--neon-green),var(--neon-blue),var(--neon-pink));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .case{text-align:center;color:var(--muted);font-size:13px;margin-bottom:18px}
  .case b{color:#cbd5e6}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px;backdrop-filter:blur(12px);margin-bottom:16px}
  .panel h2{font-size:13px;color:var(--neon-green);margin-bottom:10px;font-weight:700;letter-spacing:.5px}
  #pdfWrap{position:relative;text-align:center;background:#0a0e16;border-radius:10px;
    padding:10px;max-height:60vh;overflow:auto}
  #pdfCanvas{max-width:100%;cursor:crosshair;display:block;margin:0 auto}
  .marker{position:absolute;width:14px;height:14px;border:2px solid var(--neon-pink);
    border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;
    box-shadow:0 0 10px var(--neon-pink);display:none}
  .pager{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:10px;font-size:13px;color:var(--muted)}
  .pager button{background:#0a0e16;border:1px solid rgba(255,255,255,.1);color:#cbd5e6;
    border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit}
  #sigCanvas{width:100%;height:160px;background:#0a0e16;border:1px solid rgba(255,255,255,.1);
    border-radius:10px;touch-action:none;cursor:crosshair}
  .row{display:flex;gap:10px;margin-top:10px}
  .row button{flex:1;background:#0a0e16;border:1px solid rgba(255,255,255,.12);color:#aeb8cc;
    border-radius:9px;padding:9px;cursor:pointer;font-family:inherit;font-size:13px}
  input[type=text]{width:100%;background:#0a0e16;border:1px solid rgba(255,255,255,.1);
    border-radius:10px;padding:12px 14px;color:#e8edf5;font-family:inherit;font-size:14px}
  input[type=text]:focus{outline:none;border-color:var(--neon-green);box-shadow:0 0 0 2px rgba(0,255,159,.15)}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .submit{width:100%;margin-top:8px;padding:15px;border:none;border-radius:12px;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:15px;color:#05070d;
    background:linear-gradient(90deg,var(--neon-green),var(--neon-blue))}
  .submit:disabled{opacity:.5;cursor:not-allowed}
  .msg{text-align:center;font-size:13px;margin-top:14px;min-height:18px}
  .msg.ok{color:var(--neon-green)} .msg.err{color:var(--neon-pink)}
  .done{text-align:center;padding:40px 20px}
  .done .big{font-size:46px}
  .done h2{color:var(--neon-green);margin:14px 0 8px;font-size:20px}
  .done p{color:var(--muted);font-size:14px}
  footer{position:relative;z-index:1;margin-top:40px;padding:22px 18px 8px;
    border-top:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;
    align-items:center;justify-content:space-between;gap:18px;max-width:680px;margin-left:auto;margin-right:auto}
  .ft-brand{display:flex;align-items:center;gap:11px}
  .ft-brand img{height:34px;width:auto;opacity:.92}
  .ft-brand .nm{font-size:13px;font-weight:700;color:#cbd5e6;line-height:1.35}
  .ft-brand .nm small{display:block;font-size:10px;font-weight:400;color:var(--muted);letter-spacing:.5px}
  .ft-words{display:flex;gap:14px;font-size:11px;font-weight:700;letter-spacing:.5px}
  .ft-words span:nth-child(1){color:var(--neon-blue)}
  .ft-words span:nth-child(2){color:#cbd5e6}
  .ft-words span:nth-child(3){color:var(--neon-pink)}
  .ft-words span:nth-child(4){color:var(--neon-green)}
  .ft-legal{width:100%;text-align:center;font-size:10px;color:var(--muted);
    letter-spacing:1px;opacity:.7;margin-top:4px}
  .ft-legal b{color:var(--neon-blue);letter-spacing:2px}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="wrap" id="app">
  <div class="head"><img id="logo" alt="4force"><h1>DOCUMENT SIGN</h1></div>
  <div class="case" id="caseLine">載入文件中…</div>

  <div id="flow" style="display:none">
    <div class="panel">
      <h2>① 檢視文件 · 點選簽名位置</h2>
      <div id="pdfWrap">
        <canvas id="pdfCanvas"></canvas>
        <div class="marker" id="marker"></div>
      </div>
      <div class="pager">
        <button id="prev">‹ 上一頁</button>
        <span id="pageInfo">1 / 1</span>
        <button id="next">下一頁 ›</button>
      </div>
      <div class="hint">在文件上點一下，標記簽名落點（粉紅圈）。</div>
    </div>

    <div class="panel">
      <h2>② 手寫簽名</h2>
      <canvas id="sigCanvas"></canvas>
      <div class="row">
        <button id="clearSig">清除重簽</button>
      </div>
    </div>

    <div class="panel">
      <h2>③ 填寫姓名並送出</h2>
      <input type="text" id="signerName" placeholder="簽署人姓名">
      <button class="submit" id="submitBtn" style="margin-top:14px">確認簽署</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div id="doneView" class="panel done" style="display:none">
    <div class="big">✓</div>
    <h2>簽署完成</h2>
    <p>文件已送回 4force lab，感謝您的配合。</p>
  </div>
</div>
<footer>
  <div class="ft-brand">
    <img id="ftlogo" alt="4force">
    <div class="nm">萬合天宜有限公司 4Force Lab<small>4Force Sign Engine</small></div>
  </div>
  <div class="ft-words"><span>Insight</span><span>Strategy</span><span>Creativity</span><span>Execution</span></div>
  <div class="ft-legal">© 2026 4Force Lab CO., LTD. All rights reserved.</div>
</footer>

// ── 粒子背景 ──
(function(){const c=document.getElementById('particles'),x=c.getContext('2d');
  const COL=['#00FF9F','#FF2D78','#00B4FF'];let w,h,ps=[];
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight}rs();addEventListener('resize',rs);
  for(let i=0;i<50;i++)ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,c:COL[i%3],r:Math.random()*1.6+.6});
  function tick(){x.clearRect(0,0,w,h);
    for(let i=0;i<ps.length;i++){const p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
      x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle=p.c;x.globalAlpha=.8;x.fill();
      for(let j=i+1;j<ps.length;j++){const q=ps[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy);
        if(d<120){x.globalAlpha=(1-d/120)*.18;x.strokeStyle=p.c;x.lineWidth=.5;
          x.beginPath();x.moveTo(p.x,p.y);x.lineTo(q.x,q.y);x.stroke()}}}
    requestAnimationFrame(tick)}tick()})();

// ── F12 彩蛋 ──
console.log('%c4FORCE LAB','color:#00FF9F;font-size:28px;font-weight:800');
console.log('%cSIGN ENGINE · 文件已加密傳輸。','color:#00B4FF;font-size:13px');

const $=id=>document.getElementById(id);
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const token=(location.pathname.split('/s/')[1]||'').split(/[/?#]/)[0];
let pdfDoc=null,curPage=1,totalPages=1,placedPage=null,relX=0.5,relY=0.85;
let renderScale=1;

// ── 載入文件 ──
async function load(){
  if(!token||!/^[a-f0-9]{32}$/.test(token)){$('caseLine').textContent='連結無效';return}
  try{
    const r=await fetch('/api/doc?token='+token);
    const d=await r.json();
    if(!d.ok)throw new Error(d.detail||d.error||'載入失敗');
    $('caseLine').innerHTML='案件：<b>'+d.caseName+'</b>';
    const bytes=Uint8Array.from(atob(d.pdfBase64),c=>c.charCodeAt(0));
    pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;
    totalPages=pdfDoc.numPages;
    $('flow').style.display='block';
    await renderPage(1);
    initSig();
  }catch(e){$('caseLine').textContent=e.message}
}

async function renderPage(n){
  curPage=n;
  const page=await pdfDoc.getPage(n);
  const wrapW=$('pdfWrap').clientWidth-20;
  const vp0=page.getViewport({scale:1});
  renderScale=Math.min(1.6,wrapW/vp0.width);
  const vp=page.getViewport({scale:renderScale});
  const cv=$('pdfCanvas');cv.width=vp.width;cv.height=vp.height;
  await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
  $('pageInfo').textContent=n+' / '+totalPages;
  $('marker').style.display=(placedPage===n)?'block':'none';
  if(placedPage===n)positionMarker();
}
function positionMarker(){
  const cv=$('pdfCanvas'),m=$('marker');
  m.style.left=(cv.offsetLeft+relX*cv.width)+'px';
  m.style.top=(cv.offsetTop+relY*cv.height)+'px';
}
$('pdfCanvas').addEventListener('click',e=>{
  const cv=$('pdfCanvas'),r=cv.getBoundingClientRect();
  relX=(e.clientX-r.left)/r.width; relY=(e.clientY-r.top)/r.height;
  placedPage=curPage; $('marker').style.display='block'; positionMarker();
});
$('prev').addEventListener('click',()=>{if(curPage>1)renderPage(curPage-1)});
$('next').addEventListener('click',()=>{if(curPage<totalPages)renderPage(curPage+1)});

// ── 簽名板 ──
function initSig(){
  const cv=$('sigCanvas'),ctx=cv.getContext('2d');
  function resize(){const r=cv.getBoundingClientRect();cv.width=r.width;cv.height=r.height;
    ctx.strokeStyle='#00FF9F';ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round'}
  resize();addEventListener('resize',resize);
  let drawing=false;
  const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
    return{x:t.clientX-r.left,y:t.clientY-r.top}};
  const start=e=>{drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault()};
  const move=e=>{if(!drawing)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();e.preventDefault()};
  const end=()=>{drawing=false};
  cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);
  addEventListener('mouseup',end);
  cv.addEventListener('touchstart',start,{passive:false});
  cv.addEventListener('touchmove',move,{passive:false});
  cv.addEventListener('touchend',end);
  $('clearSig').addEventListener('click',()=>ctx.clearRect(0,0,cv.width,cv.height));
}
function sigEmpty(){
  const cv=$('sigCanvas'),d=cv.getContext('2d').getImageData(0,0,cv.width,cv.height).data;
  for(let i=3;i<d.length;i+=4)if(d[i]!==0)return false;return true;
}

// ── 送出 ──
$('submitBtn').addEventListener('click',async()=>{
  const msg=$('msg');msg.className='msg';msg.textContent='';
  const name=$('signerName').value.trim();
  if(placedPage===null){msg.className='msg err';msg.textContent='請先在文件上點選簽名位置';return}
  if(sigEmpty()){msg.className='msg err';msg.textContent='請先手寫簽名';return}
  if(!name){msg.className='msg err';msg.textContent='請填寫姓名';return}
  $('submitBtn').disabled=true;$('submitBtn').textContent='送出中…';
  try{
    const sig=$('sigCanvas').toDataURL('image/png');
    const r=await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,signerName:name,signatureBase64:sig,
        page:placedPage-1,x:relX,y:relY})});
    const d=await r.json();
    if(!d.ok)throw new Error(d.detail||d.error||'送出失敗');
    $('flow').style.display='none';$('caseLine').style.display='none';
    $('doneView').style.display='block';
  }catch(e){msg.className='msg err';msg.textContent=e.message;
    $('submitBtn').disabled=false;$('submitBtn').textContent='確認簽署'}
});

load();
</script>
